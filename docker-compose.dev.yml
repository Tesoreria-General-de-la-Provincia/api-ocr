services:
  api-ocr:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: api-ocr-dev
    ports:
      - "8000:8000"
    environment:
      - OCR_LANG=es
      - LOG_LEVEL=DEBUG
    volumes:
      - ./app:/app
    deploy:
      resources:
        limits:
          memory: 2G
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
