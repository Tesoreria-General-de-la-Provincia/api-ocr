services:
  api-ocr:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: api-ocr
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - path: .env
        required: false
    command: sh -c ".venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000 ${APP_RELOAD:+--reload}"
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT:-2G}
        reservations:
          memory: ${MEMORY_RESERVATION:-1G}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
