services:
  api-ocr:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: api-ocr
    ports:
      - "8000:8000"
    environment:
      - OCR_LANG=es
      - LOG_LEVEL=INFO
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
